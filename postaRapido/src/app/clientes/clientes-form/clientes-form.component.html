<div class="clientes-page">
  <header class="clientes-page__header">
    <div>
      <p class="clientes-page__eyebrow">Cadastros</p>
      <h1 class="clientes-page__title">Clientes</h1>
      <p class="clientes-page__subtitle">Gerenciamento de clientes</p>
    </div>
  </header>

  <form #clienteForm="ngForm" (ngSubmit)="onSubmit()" class="clientes-form">
    <div class="clientes-alert clientes-alert--danger" role="alert" *ngFor="let error of errors">
      {{ error }}
    </div>

    <div class="clientes-card" *ngIf="cliente.id">
      <h2 class="clientes-card__title"><i class="fas fa-info-circle"></i> Registro</h2>
      <div class="row">
        <div class="col-md-2">
          <div class="form-group">
            <label>ID:</label>
            <input type="text" name="id" class="form-control" [ngModel]="cliente.id" disabled="true" />
          </div>
        </div>
        <div class="col-md-4">
          <div class="form-group">
            <label>Data Cadastro:</label>
            <input type="text" name="dataCadastro" class="form-control" [ngModel]="cliente.dataCadastro" appMask="date" disabled="true" />
          </div>
        </div>
        <div class="col-md-2">
          <div class="form-group">
            <label>Ativo:</label>
            <input type="text" name="ativo" class="form-control" [ngModel]="cliente.ativo ? 'Ativo' : 'Desativado'" disabled="true" />
          </div>
        </div>
      </div>
    </div>

    <div class="clientes-card">
      <h2 class="clientes-card__title"><i class="fas fa-user"></i> Dados pessoais</h2>
      <div class="row">
        <div class="col-md-8">
          <div class="form-group">
            <label>Nome:</label>
            <input type="text" name="nome" [(ngModel)]="cliente.nome" class="form-control" [disabled]="status === 'delete'" />
          </div>
        </div>
        <div class="col-md-4">
          <div class="form-group">
            <label>CPF:</label>
            <input type="text" name="cpf" [(ngModel)]="cliente.cpf" appMask="cpf" class="form-control"
              placeholder="000.000.000-00" [disabled]="status === 'delete'" />
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-md-4">
          <div class="form-group">
            <label>Email:</label>
            <input type="text" name="email" [(ngModel)]="cliente.email" placeholder="teste@teste.com" class="form-control" [disabled]="status === 'delete'" />
          </div>
        </div>
        <div class="col-md-4">
          <div class="form-group">
            <label>Telefone:</label>
            <input type="text" [(ngModel)]="cliente.telefone" appMask="phone" name="telefone" class="form-control"
              placeholder="(99) 99999-9999" [disabled]="status === 'delete'" />
          </div>
        </div>
        <div class="col-md-4">
          <div class="form-group">
            <label>Data de Nascimento:</label>
            <input type="text" name="dataNascimento" [(ngModel)]="cliente.dataNascimento" appMask="date" class="form-control"
              placeholder="dd/mm/aaaa" [disabled]="status === 'delete'" />
          </div>
        </div>
      </div>
    </div>

    <div class="clientes-card">
      <h2 class="clientes-card__title"><i class="fas fa-map-marker-alt"></i> Endereço</h2>
      <p class="clientes-form__hint" *ngIf="status !== 'delete'">
        <i class="fas fa-lightbulb"></i> Informe o CEP e saia do campo para preencher automaticamente.
      </p>
      <div class="row">
        <div class="col-md-2">
          <div class="form-group">
            <label>CEP:</label>
            <input type="text" (blur)="completaCep()" [(ngModel)]="cliente.cep" name="cep" class="form-control" maxlength="8" [disabled]="status === 'delete'" />
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-md-5">
          <div class="form-group">
            <label>Endereço:</label>
            <input type="text" name="endereco" class="form-control" [(ngModel)]="cliente.endereco" [disabled]="status === 'delete'" />
          </div>
        </div>
        <div class="col-md-4">
          <div class="form-group">
            <label>Cidade:</label>
            <input type="text" name="cidade" class="form-control" [(ngModel)]="cliente.cidade" [disabled]="status === 'delete'" />
          </div>
        </div>
        <div class="col-md-1">
          <div class="form-group">
            <label>Estado:</label>
            <input type="text" placeholder="SP" [(ngModel)]="cliente.estado" name="estado" class="form-control" maxlength="2" [disabled]="status === 'delete'" />
          </div>
        </div>
      </div>
    </div>

    <div class="clientes-form__actions">
      <button type="button" class="clientes-btn clientes-btn--secondary" (click)="voltaLista()">
        <i class="fas fa-solid fa-arrow-left"></i> Voltar
      </button>
      <button type="submit" class="clientes-btn clientes-btn--success" *ngIf="status != 'delete' && status != 'update'">
        <i class="fas fa-solid fa-plus"></i> Salvar
      </button>
      <button type="submit" class="clientes-btn clientes-btn--primary" *ngIf="status === 'update'">
        <i class="fas fa-solid fa-pen"></i> Editar
      </button>
      <button type="submit" class="clientes-btn clientes-btn--danger" *ngIf="status === 'delete'">
        <i class="fas fa-solid fa-trash"></i> Apagar
      </button>
    </div>
  </form>
</div>
