<div class="pedidos-page">
  <header class="pedidos-page__header">
    <div>
      <p class="pedidos-page__eyebrow">Operações</p>
      <h1 class="pedidos-page__title">Pedidos</h1>
      <p class="pedidos-page__subtitle">Gerenciamento de pedidos</p>
    </div>
    <button type="button" class="pedidos-btn pedidos-btn--primary" (click)="novoPedido()">
      <i class="fa fa-plus"></i> Novo Pedido
    </button>
  </header>

  <div class="pedidos-card">
    <h2 class="pedidos-card__title"><i class="fas fa-filter"></i> Filtros</h2>
    <form #buscaPedidoForm="ngForm" (ngSubmit)="buscar()" class="pedidos-filters">
      <div class="row justify-content-center">
        <div class="col-md-4">
          <div class="form-group">
            <label for="filtroNomeCliente">Nome Cliente:</label>
            <input type="text" id="filtroNomeCliente" name="filtroNomeCliente" [(ngModel)]="filtroNomeCliente"
              class="form-control">
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label for="filtroStatusPedido">Status Pedido:</label>
            <select [(ngModel)]="filtroStatusPedido" name="filtroStatusPedido" class="form-control">
              <option value="">Selecione...</option>
              <option *ngFor="let status of statusPedidoList" [ngValue]="status.descricao">
                {{ status.descricao }}
              </option>
            </select>
          </div>
        </div>
        <div class="col-md-3 d-flex align-items-end">
          <div class="form-group w-100">
            <button type="submit" class="pedidos-btn pedidos-btn--search w-100">
              <i class="fa fa-search"></i> Pesquisar
            </button>
          </div>
        </div>
      </div>
    </form>
  </div>

  <div class="pedidos-alert pedidos-alert--success" role="alert" *ngFor="let mensagem of mensagens">
    {{ mensagem }}
  </div>
  <div class="pedidos-alert pedidos-alert--warning" role="alert" *ngIf="mensagemTabela">
    {{ mensagemTabela }}
  </div>

  <div class="pedidos-card">
    <div class="pedidos-table-wrap">
      <table class="pedidos-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Cliente</th>
            <th>Detalhes</th>
            <th>Status</th>
            <th>Valor</th>
            <th>Data Pedido</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let pedido of listaPedidos">
            <td>{{ pedido.id }}</td>
            <td><strong>{{ pedido.cliente.nome }}</strong></td>
            <td>{{ pedido.detalhes }}</td>
            <td>
              <span class="pedidos-badge">{{ pedido.status }}</span>
            </td>
            <td>{{ pedido.valor }}</td>
            <td>{{ pedido.dataPedido }}</td>
            <td>
              <div class="pedidos-table__actions">
                <a class="pedidos-btn pedidos-btn--icon pedidos-btn--edit" routerLink="/pedidos/pedidos-form/update/{{ pedido.id }}">
                  <i class="fa fa-solid fa-pen"></i>
                </a>
                <a class="pedidos-btn pedidos-btn--icon pedidos-btn--delete" routerLink="/pedidos/pedidos-form/delete/{{ pedido.id }}">
                  <i class="fa fa-solid fa-eraser"></i>
                </a>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
